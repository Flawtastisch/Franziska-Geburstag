<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DARK // Zeitknoten-System</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ═══ VARIABLES ═══ */
            :root {
                --void: #000000;
                --deep: #050810;
                --surface: #0a0d1a;
                --warm-dark: #080604;
                --border: rgba(255, 255, 255, 0.07);
                --border-active: rgba(74, 127, 181, 0.4);

                --text-white: #ffffff;
                --text-light: #d4d8e0;
                --text-muted: #6b7280;

                --blue-deep: #0d1b2a;
                --blue-mid: #1e3a5f;
                --blue-glow: #4a7fb5;
                --blue-bright: #7eb3e0;
                --blue-dim: rgba(74, 127, 181, 0.15);

                --amber: #c8a060;
                --amber-dim: rgba(200, 160, 96, 0.2);
                --amber-glow: rgba(200, 160, 96, 0.5);

                --green-ok: #4a8c6a;

                --font-serif: "Syne", sans-serif;
                --font-label: "Space Grotesk", sans-serif;
                --font-body: "Space Grotesk", sans-serif;
                --font-mono: "Space Mono", monospace;
            }

            /* ═══ RESET ═══ */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html {
                scroll-behavior: smooth;
            }
            html,
            body {
                min-height: 100%;
                background: var(--void);
                color: var(--text-light);
                font-family: var(--font-body);
                font-weight: 400;
                font-size: 15px;
                line-height: 1.8;
                overflow-x: hidden;
            }

            /* custom scrollbar */
            ::-webkit-scrollbar {
                width: 2px;
            }
            ::-webkit-scrollbar-track {
                background: #000;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--blue-mid);
            }

            /* ═══ GRAIN ═══ */
            body::after {
                content: "";
                position: fixed;
                inset: -50%;
                width: 200%;
                height: 200%;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
                background-size: 256px;
                opacity: 0.025;
                pointer-events: none;
                z-index: 9999;
                animation: grain 0.5s steps(1) infinite;
            }
            @keyframes grain {
                0%,
                100% {
                    transform: translate(0, 0);
                }
                10% {
                    transform: translate(-2%, -3%);
                }
                20% {
                    transform: translate(3%, 1%);
                }
                30% {
                    transform: translate(-1%, 4%);
                }
                40% {
                    transform: translate(4%, -2%);
                }
                50% {
                    transform: translate(-3%, 3%);
                }
                60% {
                    transform: translate(2%, -4%);
                }
                70% {
                    transform: translate(-4%, 1%);
                }
                80% {
                    transform: translate(1%, 3%);
                }
                90% {
                    transform: translate(3%, -1%);
                }
            }

            /* ═══ SCANLINES (very subtle) ═══ */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 9998;
                background: repeating-linear-gradient(
                    to bottom,
                    transparent 0,
                    transparent 3px,
                    rgba(0, 0, 0, 0.04) 3px,
                    rgba(0, 0, 0, 0.04) 6px
                );
            }

            /* ═══ BACKGROUND CANVAS ═══ */
            #bg-canvas {
                position: fixed;
                inset: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 0;
            }
            #app,
            #loading-screen,
            #flash {
                position: relative;
                z-index: 2;
            }

            /* ═══ FOG LAYER ═══ */
            .fog-layer {
                position: fixed;
                inset: -20%;
                width: 140%;
                height: 140%;
                background: radial-gradient(
                    ellipse at center,
                    rgba(30, 58, 95, 0.06) 0%,
                    transparent 65%
                );
                pointer-events: none;
                z-index: 1;
                animation: fog-drift 25s ease-in-out infinite;
            }
            @keyframes fog-drift {
                0% {
                    transform: translate(0, 0) scale(1);
                }
                33% {
                    transform: translate(2%, -1%) scale(1.015);
                }
                66% {
                    transform: translate(-1%, 2%) scale(0.985);
                }
                100% {
                    transform: translate(0, 0) scale(1);
                }
            }

            /* ═══ LOADING SCREEN ═══ */
            #loading-screen {
                position: fixed;
                inset: 0;
                background: #000;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2.5rem;
                z-index: 999998;
            }
            #loading-screen.slide-out {
                animation: slideUp 0.8s cubic-bezier(0.7, 0, 0.3, 1) forwards;
            }
            @keyframes slideUp {
                from {
                    transform: translateY(0);
                    opacity: 1;
                }
                to {
                    transform: translateY(-100%);
                    opacity: 0;
                }
            }

            #heart-svg {
                display: block;
                overflow: visible;
            }
            #heart-path {
                fill: none;
                stroke: var(--amber);
                stroke-width: 1.5;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            @keyframes heart-glow-pulse {
                0%,
                100% {
                    filter: drop-shadow(0 0 4px rgba(200, 160, 96, 0.5));
                }
                50% {
                    filter: drop-shadow(0 0 14px rgba(200, 160, 96, 0.9))
                        drop-shadow(0 0 28px rgba(200, 160, 96, 0.4));
                }
            }

            #mohrchen-reveal {
                position: absolute;
                font-family: var(--font-serif);
                font-weight: 700;
                font-size: 2.6rem;
                letter-spacing: 0.15em;
                color: var(--amber);
                opacity: 0;
                clip-path: inset(0 100% 0 0);
                white-space: nowrap;
                text-shadow: 0 0 20px rgba(200, 160, 96, 0.6);
                transition:
                    clip-path 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.3s ease;
            }
            #mohrchen-reveal.show {
                opacity: 1;
                clip-path: inset(0 0% 0 0);
            }

            #heart-container {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 90px;
            }

            .loading-label {
                font-family: var(--font-label);
                font-weight: 400;
                font-size: 0.65rem;
                letter-spacing: 0.5em;
                color: var(--text-muted);
                text-transform: uppercase;
            }
            .loading-bar-wrap {
                width: 160px;
                height: 1px;
                background: rgba(255, 255, 255, 0.06);
            }
            .loading-bar-inner {
                height: 100%;
                width: 0%;
                background: linear-gradient(
                    90deg,
                    var(--blue-mid),
                    var(--blue-glow)
                );
                transition: width 0.05s linear;
            }

            /* ═══ ANIMATIONS ═══ */
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                20% {
                    transform: translateX(-7px);
                }
                40% {
                    transform: translateX(7px);
                }
                60% {
                    transform: translateX(-4px);
                }
                80% {
                    transform: translateX(4px);
                }
            }
            @keyframes redFlash {
                0% {
                    opacity: 0;
                }
                15% {
                    opacity: 0.6;
                }
                40% {
                    opacity: 0.2;
                }
                70% {
                    opacity: 0.5;
                }
                100% {
                    opacity: 0;
                }
            }
            @keyframes pulse-glow-blue {
                0%,
                100% {
                    box-shadow:
                        0 0 8px rgba(74, 127, 181, 0.3),
                        0 0 20px rgba(74, 127, 181, 0.1);
                }
                50% {
                    box-shadow:
                        0 0 18px rgba(74, 127, 181, 0.6),
                        0 0 40px rgba(74, 127, 181, 0.2);
                }
            }
            @keyframes pulse-glow-red {
                0%,
                100% {
                    box-shadow:
                        0 0 8px rgba(180, 45, 45, 0.4),
                        0 0 24px rgba(180, 45, 45, 0.1);
                }
                50% {
                    box-shadow:
                        0 0 20px rgba(220, 45, 45, 0.7),
                        0 0 50px rgba(220, 45, 45, 0.25);
                }
            }
            @keyframes glitch {
                0%,
                93%,
                100% {
                    transform: translateX(0);
                    clip-path: none;
                }
                94% {
                    transform: translateX(-3px);
                    clip-path: inset(10% 0 80% 0);
                }
                96% {
                    transform: translateX(3px);
                    clip-path: inset(60% 0 20% 0);
                }
                98% {
                    transform: translateX(-2px);
                    clip-path: inset(30% 0 50% 0);
                }
                99% {
                    transform: translateX(0);
                    clip-path: none;
                }
            }
            @keyframes bulb-flicker {
                0%,
                18%,
                20%,
                22%,
                24%,
                53%,
                55%,
                96%,
                100% {
                    opacity: 1;
                    text-shadow:
                        0 0 10px rgba(200, 160, 96, 0.8),
                        0 0 24px rgba(200, 160, 96, 0.4),
                        0 0 48px rgba(200, 160, 96, 0.15);
                }
                19%,
                23%,
                54%,
                97% {
                    opacity: 0.65;
                    text-shadow: 0 0 4px rgba(200, 160, 96, 0.3);
                }
            }
            @keyframes spin-slow {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }

            /* ═══ TWO-COLUMN PUZZLE LAYOUT ═══ */
            .puzzle-left,
            .puzzle-right {
                padding: 56px 52px;
                min-height: 100vh;
            }
            .puzzle-left {
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
            }
            .puzzle-right {
                display: flex;
                flex-direction: column;
                justify-content: center;
                position: relative;
                overflow: hidden;
            }

            /* Consistent vertical rhythm in left column */
            .puzzle-left .system-line {
                margin-bottom: 16px;
            }
            .puzzle-left .badge {
                margin-bottom: 10px;
                display: block;
            }
            .puzzle-left h1 {
                margin-top: 0;
                margin-bottom: 4px;
            }
            .puzzle-left h2 {
                margin-bottom: 0;
            }
            .puzzle-left .divider {
                margin: 20px 0;
            }
            .puzzle-left .narrative {
                margin: 0 0 20px;
            }
            .puzzle-left .hint-btn {
                margin-top: 4px;
            }
            .puzzle-left .success-box {
                margin-top: 20px;
            }
            .puzzle-left .location-hint {
                margin-top: 20px;
            }
            .puzzle-left .reveal-box {
                margin-top: 20px;
            }

            /* Consistent spacing in right column */
            .puzzle-right .sub-label {
                text-align: left;
                margin: 0 0 12px;
                letter-spacing: 0.2em;
            }
            .puzzle-right .sub-label + .sub-label {
                margin-top: 28px;
            }
            .puzzle-right .code-display {
                margin: 0 0 28px;
            }
            .puzzle-right .input-row {
                margin-top: 0;
            }
            .puzzle-right .btn {
                margin-top: 20px;
            }
            .puzzle-right .combo-lock {
                margin: 0 0 4px;
            }

            /* h2 slightly more visible */
            h2 {
                font-family: "Space Grotesk", sans-serif;
                font-weight: 400;
                font-size: 0.75rem;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                color: #5a6170;
                margin-bottom: 24px;
            }

            #app[data-era] {
                display: grid;
                grid-template-columns: 44fr 56fr;
                min-height: 100vh;
                border: none;
                max-width: none;
                padding: 0;
                width: 100%;
            }

            /* Override for pages without era (intro, finale) */
            #app:not([data-era]),
            #app[data-era=""] {
                display: block;
                max-width: 820px;
                margin: 0 auto;
                padding: 80px 48px 100px;
                min-height: 100vh;
            }

            @media (max-width: 768px) {
                #app[data-era] {
                    grid-template-columns: 1fr;
                }
                .puzzle-left {
                    border-right: none;
                    border-bottom: 1px solid var(--border);
                    min-height: auto;
                    padding: 40px 24px;
                }
                .puzzle-right {
                    min-height: auto;
                    padding: 36px 24px 60px;
                }
            }

            /* ═══ ERA BACKGROUNDS ═══ */
            #app[data-era="1953"] {
                background:
                    radial-gradient(
                        ellipse 80% 40% at 50% 0%,
                        rgba(200, 160, 96, 0.06) 0%,
                        transparent 60%
                    ),
                    var(--warm-dark);
            }
            #app[data-era="1986"] {
                background:
                    radial-gradient(
                        ellipse 80% 40% at 50% 0%,
                        rgba(30, 58, 95, 0.2) 0%,
                        transparent 60%
                    ),
                    var(--deep);
            }
            #app[data-era="2019"] {
                background: var(--void);
            }
            #app[data-era="2052"] {
                background:
                    radial-gradient(
                        ellipse 80% 40% at 50% 100%,
                        rgba(20, 20, 50, 0.4) 0%,
                        transparent 60%
                    ),
                    #030306;
            }
            #app[data-era="inf"] {
                background:
                    radial-gradient(
                        ellipse 100% 50% at 50% 50%,
                        rgba(30, 58, 95, 0.15) 0%,
                        transparent 70%
                    ),
                    var(--void);
            }

            /* ═══ TYPOGRAPHY ═══ */
            h1 {
                font-family: "Syne", sans-serif;
                font-weight: 700;
                font-size: clamp(1.8rem, 4vw, 3rem);
                color: #ffffff;
                letter-spacing: 0.04em;
                line-height: 1.2;
                margin-bottom: 6px;
            }
            #app[data-era="1953"] h1 {
                animation: bulb-flicker 9s infinite;
                color: #f0e8d0;
            }
            #app[data-era="1986"] h1 {
                letter-spacing: 0.1em;
                font-size: clamp(1.4rem, 3.5vw, 2.4rem);
            }
            #app[data-era="2052"] h1 {
                font-family: var(--font-mono);
                font-size: clamp(1rem, 3.5vw, 1.5rem);
                letter-spacing: 0.15em;
                color: #9090b0;
            }

            h2 {
                font-family: "Space Grotesk", sans-serif;
                font-weight: 400;
                font-size: 0.8rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--text-muted);
                margin-bottom: 24px;
            }

            /* ═══ SYSTEM LINE ═══ */
            .system-line {
                font-family: var(--font-mono);
                font-size: 0.62rem;
                color: rgba(255, 255, 255, 0.12);
                letter-spacing: 0.2em;
                margin-bottom: 24px;
                text-transform: uppercase;
            }
            .status-line {
                font-family: var(--font-label);
                font-size: 0.65rem;
                letter-spacing: 0.3em;
                color: var(--blue-glow);
                text-transform: uppercase;
                margin-bottom: 28px;
            }
            #app[data-era="1953"] .status-line {
                color: var(--amber);
            }
            #app[data-era="1986"] .status-line {
                color: var(--blue-bright);
            }
            #app[data-era="2052"] .status-line {
                color: #6060a0;
            }

            /* ═══ ORNAMENTS ═══ */
            .ornament {
                display: block;
                width: 100%;
                max-width: 420px;
                margin: 20px auto;
                opacity: 0.4;
            }
            #app[data-era="1953"] .ornament {
                color: #c8a060;
                opacity: 0.5;
            }
            #app[data-era="1986"] .ornament {
                color: #4a7fb5;
                opacity: 0.4;
            }
            #app[data-era="2019"] .ornament {
                color: #606880;
                opacity: 0.3;
            }
            #app[data-era="2052"] .ornament {
                color: #505070;
                opacity: 0.35;
            }

            /* ═══ DIVIDER ═══ */
            .divider {
                border: none;
                margin: 28px 0;
                height: 1px;
                background: var(--border);
            }
            #app[data-era="1953"] .divider {
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(200, 160, 96, 0.3),
                    transparent
                );
            }
            #app[data-era="1986"] .divider {
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(74, 127, 181, 0.4),
                    transparent
                );
            }
            #app[data-era="2052"] .divider {
                background: linear-gradient(
                    90deg,
                    rgba(80, 80, 112, 0.5),
                    rgba(80, 80, 112, 0.2),
                    transparent
                );
            }

            /* ═══ BADGES ═══ */
            .badge {
                display: inline-block;
                font-family: var(--font-mono);
                font-size: 0.58rem;
                letter-spacing: 0.25em;
                padding: 2px 8px;
                border: 1px solid currentColor;
                text-transform: uppercase;
                vertical-align: middle;
                margin-right: 8px;
                flex-shrink: 0;
            }
            .badge-1953 {
                color: #c8a060;
                border-color: rgba(200, 160, 96, 0.5);
                background: rgba(200, 160, 96, 0.06);
            }
            .badge-1986 {
                color: #4a7fb5;
                border-color: rgba(74, 127, 181, 0.5);
                background: rgba(74, 127, 181, 0.06);
            }
            .badge-2019 {
                color: #7a8898;
                border-color: rgba(122, 136, 152, 0.5);
                background: rgba(122, 136, 152, 0.05);
            }
            .badge-2052 {
                color: #8888aa;
                border-color: rgba(136, 136, 170, 0.4);
                background: rgba(136, 136, 170, 0.04);
            }
            .badge-inf {
                color: var(--blue-bright);
                border-color: rgba(126, 179, 224, 0.4);
                background: rgba(126, 179, 224, 0.04);
            }

            /* ═══ NARRATIVE ═══ */
            .narrative {
                padding: 20px 0 20px 20px;
                margin: 20px 0;
                border-left: 1px solid var(--border-active);
                color: #d4d8e0;
                font-weight: 400;
                line-height: 1.9;
            }
            .narrative p {
                margin-bottom: 10px;
                font-size: 1rem;
            }
            .narrative p:last-child {
                margin-bottom: 0;
            }

            #app[data-era="1953"] .narrative {
                border-left-color: rgba(200, 160, 96, 0.4);
                color: #d4d8e0;
            }
            #app[data-era="1986"] .narrative {
                border-left-color: rgba(74, 127, 181, 0.4);
                color: #d4d8e0;
            }
            #app[data-era="2019"] .narrative {
                border-left-color: rgba(255, 255, 255, 0.08);
                color: #d4d8e0;
            }
            #app[data-era="2052"] .narrative {
                border-left-color: rgba(100, 100, 150, 0.3);
                color: #8888a0;
                font-family: var(--font-mono);
                font-size: 0.88rem;
                line-height: 2;
            }

            /* ═══ BUTTONS ═══ */
            .btn {
                display: inline-block;
                background: transparent;
                color: var(--blue-glow);
                border: 1px solid rgba(74, 127, 181, 0.4);
                font-family: var(--font-label);
                font-weight: 400;
                font-size: 0.72rem;
                letter-spacing: 0.35em;
                text-transform: uppercase;
                padding: 0.85rem 2.2rem;
                min-height: 44px;
                cursor: pointer;
                position: relative;
                overflow: hidden;
                text-decoration: none;
                margin-top: 24px;
                transition:
                    color 0.3s,
                    border-color 0.3s;
            }
            .btn::before {
                content: "";
                position: absolute;
                inset: 0;
                background: var(--blue-mid);
                transform: translateX(-101%);
                transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .btn:hover {
                color: var(--text-white);
                border-color: var(--blue-glow);
            }
            .btn:hover::before {
                transform: translateX(0);
            }
            .btn > * {
                position: relative;
                z-index: 1;
            }
            .btn-full {
                display: block;
                width: 100%;
                text-align: center;
            }

            #app[data-era="1953"] .btn {
                color: var(--amber);
                border-color: rgba(200, 160, 96, 0.4);
            }
            #app[data-era="1953"] .btn::before {
                background: rgba(200, 160, 96, 0.15);
            }
            #app[data-era="1953"] .btn:hover {
                color: #f0e8d0;
                border-color: var(--amber);
            }
            #app[data-era="2052"] .btn {
                font-family: var(--font-mono);
                font-size: 0.7rem;
                letter-spacing: 0.2em;
            }

            /* ═══ INPUTS ═══ */
            .answer-input {
                background: transparent;
                border: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                color: var(--text-white);
                font-family: var(--font-mono);
                font-size: 1.05rem;
                letter-spacing: 0.2em;
                padding: 0.5rem 0;
                width: 100%;
                min-height: 44px;
                outline: none;
                text-align: center;
                text-transform: uppercase;
                transition: border-color 0.3s;
            }
            .answer-input:focus {
                border-bottom-color: var(--blue-glow);
                box-shadow: 0 1px 0 rgba(74, 127, 181, 0.4);
            }
            .answer-input.error {
                animation: shake 0.4s ease;
                border-bottom-color: rgba(220, 60, 60, 0.7);
            }
            .answer-input.correct {
                border-bottom-color: var(--green-ok);
                color: #6db890;
            }

            #app[data-era="1953"] .answer-input:focus {
                border-bottom-color: var(--amber);
                box-shadow: 0 1px 0 var(--amber-dim);
            }
            #app[data-era="2052"] .answer-input {
                font-size: 0.9rem;
                letter-spacing: 0.15em;
            }

            .input-row {
                display: flex;
                gap: 12px;
                align-items: stretch;
                margin-top: 18px;
            }
            .input-row .btn {
                margin-top: 0;
                white-space: nowrap;
            }

            /* ═══ HINT ═══ */
            .hint-box {
                background: rgba(255, 255, 255, 0.02);
                border-left: 1px solid rgba(255, 255, 255, 0.08);
                padding: 14px 18px;
                margin-top: 16px;
                font-family: var(--font-mono);
                font-size: 0.8rem;
                color: var(--text-muted);
                display: none;
                line-height: 1.8;
            }
            .hint-box.visible {
                display: block;
                animation: fadeInUp 0.5s ease;
            }

            .hint-btn {
                background: transparent;
                border: none;
                color: rgba(255, 255, 255, 0.18);
                font-family: var(--font-label);
                font-weight: 400;
                font-size: 0.65rem;
                cursor: pointer;
                padding: 8px 0;
                margin-top: 10px;
                display: none;
                letter-spacing: 0.25em;
                text-transform: uppercase;
                transition: color 0.2s;
            }
            .hint-btn:hover {
                color: var(--blue-glow);
            }
            .hint-btn.visible {
                display: inline-block;
            }

            /* ═══ SUCCESS BOX ═══ */
            .success-box {
                display: none;
                background: rgba(74, 140, 106, 0.06);
                border-left: 1px solid rgba(74, 140, 106, 0.5);
                padding: 16px 20px;
                margin-top: 24px;
            }
            .success-box.visible {
                display: block;
                animation: fadeInUp 0.6s ease;
            }
            .success-text {
                color: #6db890;
                font-family: var(--font-mono);
                font-size: 0.82rem;
                letter-spacing: 0.12em;
            }
            .success-quote {
                color: var(--text-muted);
                font-family: var(--font-serif);
                font-style: italic;
                margin-top: 8px;
                font-size: 0.95rem;
            }

            /* ═══ REVEAL BOX ═══ */
            .reveal-box {
                display: none;
                border: 1px solid rgba(74, 127, 181, 0.25);
                padding: 32px 28px;
                margin-top: 28px;
                background: rgba(13, 27, 42, 0.7);
                text-align: center;
                position: relative;
                animation: fadeInUp 0.8s ease;
            }
            .reveal-box::before {
                content: "";
                position: absolute;
                top: 8px;
                left: 8px;
                width: 16px;
                height: 16px;
                border-top: 1px solid var(--blue-glow);
                border-left: 1px solid var(--blue-glow);
            }
            .reveal-box::after {
                content: "";
                position: absolute;
                bottom: 8px;
                right: 8px;
                width: 16px;
                height: 16px;
                border-bottom: 1px solid var(--blue-glow);
                border-right: 1px solid var(--blue-glow);
            }
            .reveal-box.visible {
                display: block;
            }
            .reveal-title {
                font-family: var(--font-label);
                font-weight: 400;
                font-size: 0.65rem;
                color: var(--blue-glow);
                letter-spacing: 0.35em;
                margin-bottom: 20px;
                text-transform: uppercase;
            }
            .reveal-content {
                color: var(--text-light);
                line-height: 2;
                font-weight: 400;
            }
            .reveal-content strong {
                color: var(--text-white);
                font-weight: 500;
            }
            .reveal-emoji {
                font-size: 2.4rem;
                display: block;
                margin: 16px 0;
            }

            /* ═══ CODE DISPLAY ═══ */
            .code-display {
                font-family: var(--font-mono);
                font-size: clamp(0.95rem, 3.5vw, 1.3rem);
                color: var(--blue-bright);
                letter-spacing: 0.25em;
                padding: 24px 20px;
                background: rgba(0, 0, 0, 0.5);
                border: 1px solid var(--border);
                text-align: center;
                margin: 24px 0;
                word-break: break-all;
                line-height: 2.2;
            }
            #app[data-era="1953"] .code-display {
                color: var(--amber);
                border-color: rgba(200, 160, 96, 0.15);
                text-shadow: 0 0 12px var(--amber-dim);
            }
            #app[data-era="1986"] .code-display {
                color: var(--blue-bright);
                border-color: rgba(74, 127, 181, 0.2);
                letter-spacing: 0.15em;
            }
            #app[data-era="2052"] .code-display {
                font-size: clamp(0.7rem, 2.5vw, 0.95rem);
                letter-spacing: 0.08em;
                color: #8888a0;
            }

            /* ═══ MIRROR WORD ═══ */
            .mirror-word {
                display: inline-block;
                transform: scaleX(-1);
                font-family: var(--font-serif);
                font-size: clamp(2rem, 9vw, 3.2rem);
                color: var(--blue-bright);
                letter-spacing: 0.1em;
                font-weight: 700;
            }
            .mirror-container {
                text-align: center;
                padding: 28px;
                background: rgba(0, 0, 0, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.06);
                margin: 24px 0;
            }

            /* ═══ WORD SEARCH ═══ */
            .word-search {
                display: grid;
                grid-template-columns: repeat(8, 1fr);
                gap: 2px;
                margin: 20px 0;
                max-width: 340px;
            }
            .ws-cell {
                aspect-ratio: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #050a14;
                border: 1px solid rgba(74, 127, 181, 0.1);
                font-family: var(--font-mono);
                font-size: clamp(0.65rem, 2.2vw, 0.85rem);
                cursor: pointer;
                user-select: none;
                color: #4a6080;
                transition:
                    background 0.12s,
                    color 0.12s,
                    border-color 0.12s;
            }
            .ws-cell:hover {
                background: rgba(74, 127, 181, 0.08);
                color: var(--blue-bright);
                border-color: rgba(74, 127, 181, 0.3);
            }
            .ws-cell.selected {
                background: rgba(74, 127, 181, 0.15);
                color: var(--blue-glow);
                border-color: rgba(74, 127, 181, 0.5);
            }
            .ws-cell.correct {
                background: rgba(74, 127, 181, 0.2);
                color: var(--blue-bright);
                border-color: var(--blue-glow);
            }

            /* ═══ ANAGRAM TILES ═══ */
            .tile-row {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin: 24px 0;
                justify-content: center;
            }
            .tile {
                width: clamp(42px, 11vw, 52px);
                height: clamp(42px, 11vw, 52px);
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.12);
                font-family: var(--font-mono);
                font-size: clamp(0.95rem, 3.5vw, 1.3rem);
                color: var(--text-white);
                box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
                transition: border-color 0.2s;
            }
            .tile:hover {
                border-color: rgba(255, 255, 255, 0.25);
            }

            /* ═══ FINAL INPUTS (puzzle 8) ═══ */
            .final-row {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 12px;
            }
            .final-row .answer-input {
                flex: 1;
                min-width: 0;
                text-align: left;
                padding-left: 8px;
                font-size: 0.9rem;
            }
            .final-row .badge {
                min-width: 52px;
                text-align: center;
            }
            .final-label {
                font-family: var(--font-label);
                font-weight: 400;
                font-size: 0.65rem;
                letter-spacing: 0.15em;
                color: var(--text-muted);
                white-space: nowrap;
                text-transform: uppercase;
            }

            /* ═══ FINALE PHOTO ═══ */
            .finale-foto {
                display: block;
                max-width: 100%;
                width: 340px;
                margin: 0 auto 28px;
                border: 1px solid rgba(220, 60, 60, 0.5);
                animation:
                    glitch 5s infinite,
                    pulse-glow-red 3s ease-in-out infinite;
            }
            .foto-placeholder {
                width: 280px;
                height: 200px;
                margin: 0 auto 28px;
                border: 1px solid rgba(220, 60, 60, 0.4);
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-muted);
                font-family: var(--font-mono);
                font-size: 1rem;
                letter-spacing: 0.2em;
                animation: pulse-glow-red 3s ease-in-out infinite;
            }
            .finale-text {
                color: var(--text-light);
                text-align: center;
                margin-top: 24px;
                font-size: 1rem;
                line-height: 2;
                white-space: pre-line;
                font-weight: 400;
            }

            /* ═══ ERROR ═══ */
            .error-page {
                text-align: center;
                padding-top: 100px;
            }
            .error-page h1 {
                color: rgba(220, 60, 60, 0.8);
            }
            .error-page p {
                color: var(--text-muted);
                margin-top: 18px;
                font-family: var(--font-mono);
                font-size: 0.8rem;
                letter-spacing: 0.15em;
            }

            /* ═══ FLASH ═══ */
            #flash {
                position: fixed;
                inset: 0;
                background: #000;
                z-index: 999997;
                opacity: 0;
                pointer-events: none;
            }

            /* ═══ LOCATION HINT ═══ */
            .location-hint {
                display: none;
                margin-top: 28px;
                border: 1px dashed rgba(74, 127, 181, 0.2);
                background: rgba(13, 27, 42, 0.4);
                padding: 22px 22px 18px;
                position: relative;
            }
            .location-hint.visible {
                display: block;
                animation: fadeInUp 1s ease;
            }
            .location-hint::before {
                content: attr(data-label);
                position: absolute;
                top: -9px;
                left: 16px;
                background: var(--void);
                padding: 0 10px;
                font-family: var(--font-mono);
                font-size: 0.58rem;
                letter-spacing: 0.25em;
                color: var(--blue-glow);
                text-transform: uppercase;
            }
            #app[data-era="1953"] .location-hint {
                border-color: rgba(200, 160, 96, 0.25);
            }
            #app[data-era="1953"] .location-hint::before {
                background: var(--warm-dark);
                color: var(--amber);
            }

            .reveal-box .location-hint {
                display: block;
                margin-top: 20px;
                border-color: rgba(74, 127, 181, 0.2);
            }
            .reveal-box .location-hint.visible {
                display: block;
            }
            .reveal-box .location-hint::before {
                background: rgba(13, 27, 42, 0.9);
            }

            .location-hint-text {
                color: var(--text-muted);
                font-size: 0.88rem;
                line-height: 1.9;
                font-weight: 400;
            }
            .location-hint-text strong {
                color: var(--text-light);
                display: block;
                margin-top: 14px;
                font-family: var(--font-label);
                font-weight: 400;
                font-size: 0.75rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
            }

            /* ═══ MISC HELPERS ═══ */
            .sub-label {
                font-family: var(--font-label);
                font-weight: 400;
                font-size: 0.65rem;
                letter-spacing: 0.3em;
                color: var(--text-muted);
                text-align: center;
                margin: -12px 0 16px;
                text-transform: uppercase;
            }

            /* ═══ CONFETTI CANVAS ═══ */
            #confetti-canvas {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 10000;
            }

            /* ═══ SVG SKETCH DECORATIONS ═══ */
            .sketch {
                position: absolute;
                pointer-events: none;
                opacity: 0.07;
            }

            /* ═══ COMBINATION LOCK ═══ */
            .combo-lock {
                display: flex;
                gap: 6px;
                align-items: center;
                margin: 24px 0;
                flex-wrap: wrap;
            }
            .wheel-col {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                outline: none;
            }
            .wheel-btn {
                width: 48px;
                height: 28px;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: rgba(255, 255, 255, 0.3);
                font-size: 9px;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s,
                    border-color 0.15s;
                font-family: var(--font-mono);
                user-select: none;
            }
            .wheel-btn:hover {
                background: rgba(74, 127, 181, 0.15);
                color: #ffffff;
                border-color: rgba(74, 127, 181, 0.5);
            }
            .wheel-drum {
                width: 48px;
                height: 114px;
                overflow: hidden;
                position: relative;
                background: rgba(0, 0, 0, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.12);
                cursor: ns-resize;
            }
            .wheel-drum::before,
            .wheel-drum::after {
                content: "";
                position: absolute;
                left: 0;
                right: 0;
                height: 36px;
                z-index: 2;
                pointer-events: none;
            }
            .wheel-drum::before {
                top: 0;
                background: linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.95),
                    transparent
                );
            }
            .wheel-drum::after {
                bottom: 0;
                background: linear-gradient(
                    to top,
                    rgba(0, 0, 0, 0.95),
                    transparent
                );
            }
            .wheel-drum-inner {
                position: absolute;
                width: 100%;
                top: 0;
                transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .wheel-letter {
                height: 38px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--font-mono);
                font-size: 1.25rem;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.18);
                letter-spacing: 0.05em;
                transition: color 0.15s;
            }
            .wheel-letter.active {
                color: #ffffff;
                text-shadow:
                    0 0 12px rgba(74, 127, 181, 0.8),
                    0 0 24px rgba(74, 127, 181, 0.4);
            }
            .wheel-highlight {
                position: absolute;
                top: 38px;
                left: 0;
                right: 0;
                height: 38px;
                border-top: 1px solid rgba(74, 127, 181, 0.3);
                border-bottom: 1px solid rgba(74, 127, 181, 0.3);
                background: rgba(74, 127, 181, 0.05);
                pointer-events: none;
                z-index: 1;
            }
            #app[data-era="1953"] .wheel-letter.active {
                text-shadow: 0 0 12px rgba(200, 160, 96, 0.9);
            }
            #app[data-era="1953"] .wheel-highlight {
                border-color: rgba(200, 160, 96, 0.4);
                background: rgba(200, 160, 96, 0.04);
            }
            #app[data-era="1953"] .wheel-btn:hover {
                background: rgba(200, 160, 96, 0.1);
                border-color: rgba(200, 160, 96, 0.4);
            }

            .combo-submit-row {
                margin-top: 4px;
                display: flex;
                gap: 12px;
                align-items: center;
            }
            .combo-lock.solved .wheel-letter.active {
                color: #6db890;
                text-shadow: 0 0 10px rgba(109, 184, 144, 0.6);
            }
            .combo-lock.solved .wheel-highlight {
                border-color: rgba(109, 184, 144, 0.4);
                background: rgba(109, 184, 144, 0.05);
            }
            .combo-lock.error-shake {
                animation: shake 0.4s ease;
            }

            /* ═══ RESPONSIVE ═══ */
            @media (max-width: 400px) {
                .word-search {
                    max-width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <canvas id="bg-canvas"></canvas>
        <div class="fog-layer"></div>

        <!-- LOADING SCREEN -->
        <div id="loading-screen">
            <div id="heart-container">
                <svg
                    id="heart-svg"
                    viewBox="0 0 200 175"
                    width="110"
                    height="96"
                >
                    <path
                        id="heart-path"
                        d="M100 46 C100 46,118 28,136 26 C158 23,178 38,178 66 C178 110,105 150,100 155 C95 150,22 110,22 66 C22 38,42 23,64 26 C82 28,100 46,100 46 Z"
                    />
                </svg>
                <div id="mohrchen-reveal">Möhrchen</div>
            </div>
            <div class="loading-bar-wrap">
                <div class="loading-bar-inner" id="loading-bar-inner"></div>
            </div>
            <p class="loading-label">Zeitlinie wird initialisiert</p>
        </div>

        <div id="flash"></div>
        <div id="app"></div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
        <script>
            // ═══════════════════════════════════════════════════
            //  CONFIGURATION
            // ═══════════════════════════════════════════════════
            const PAGES = {
                "": "intro",
                1: "puzzle1",
                2: "puzzle2",
                3: "puzzle3",
                4: "puzzle4",
                5: "puzzle5",
                6: "puzzle6",
                7: "puzzle7",
                8: "puzzle8",
                ende: "finale",
            };

            const ANSWERS = {
                puzzle1: "LICHT",
                puzzle2: "KNOTEN",
                puzzle3: "EWIG",
                puzzle4: "NACHT",
                puzzle5: "REISE",
                puzzle6: "WELT",
                puzzle7: "ANFANG",
            };

            // ═══════════════════════════════════════════════════
            //  ROUTING (Hash-basiert: index.html#1, #2 … #ende)
            // ═══════════════════════════════════════════════════
            function getPage() {
                return PAGES[window.location.hash.slice(1)] || "intro";
            }

            function navigate(target) {
                flash(() => {
                    window.location.hash = target;
                });
            }

            function flash(cb) {
                const el = document.getElementById("flash");
                el.style.background = "#000";
                el.style.pointerEvents = "all";
                if (window.gsap) {
                    gsap.fromTo(el, { opacity: 0 }, {
                        opacity: 1, duration: 0.22, ease: "power1.in",
                        onComplete: () => {
                            cb();
                            gsap.to(el, {
                                opacity: 0, duration: 0.45, delay: 0.06, ease: "power1.out",
                                onComplete: () => { el.style.pointerEvents = "none"; }
                            });
                        }
                    });
                } else {
                    el.style.opacity = "1";
                    setTimeout(() => {
                        cb();
                        setTimeout(() => { el.style.opacity = "0"; el.style.pointerEvents = "none"; }, 150);
                    }, 260);
                }
            }

            // ═══════════════════════════════════════════════════
            //  HELPERS
            // ═══════════════════════════════════════════════════
            function checkAnswer(input, correctKey) {
                return input.trim().toUpperCase() === ANSWERS[correctKey];
            }

            function badge(year) {
                const cls = year === "∞" ? "badge-inf" : `badge-${year}`;
                return `<span class="badge ${cls}">${year}</span>`;
            }

            function systemLine(text) {
                return `<p class="system-line">&gt; ${text}</p>`;
            }

            function animatePageIn() {
                if (!window.gsap) return;
                gsap.from("#app > *", {
                    opacity: 0,
                    y: 28,
                    duration: 0.7,
                    stagger: 0.1,
                    ease: "power2.out",
                    clearProps: "all",
                });
            }

            function setupAnswerLogic({
                inputId,
                btnId,
                hintBtnId,
                hintBoxId,
                successId,
                revealId,
                correctKey,
                onSuccess,
            }) {
                let attempts = 0;
                const input = document.getElementById(inputId);
                const btn = document.getElementById(btnId);
                const hintBtn = document.getElementById(hintBtnId);
                const hintBox = document.getElementById(hintBoxId);
                const success = document.getElementById(successId);
                const reveal = revealId
                    ? document.getElementById(revealId)
                    : null;

                function tryAnswer() {
                    if (!input || input.value.trim() === "") return;
                    if (checkAnswer(input.value, correctKey)) {
                        input.classList.remove("error");
                        input.classList.add("correct");
                        input.disabled = true;
                        btn.disabled = true;
                        if (success) success.classList.add("visible");
                        if (reveal) {
                            setTimeout(
                                () => reveal.classList.add("visible"),
                                600,
                            );
                        }
                        if (onSuccess) setTimeout(onSuccess, 300);
                    } else {
                        attempts++;
                        input.classList.remove("correct");
                        input.classList.add("error");
                        setTimeout(() => input.classList.remove("error"), 400);
                        if (attempts >= 2) {
                            if (hintBtn) hintBtn.classList.add("visible");
                        }
                    }
                }

                if (btn) btn.addEventListener("click", tryAnswer);
                if (input)
                    input.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") tryAnswer();
                    });
                if (hintBtn && hintBox) {
                    hintBtn.addEventListener("click", () => {
                        hintBox.classList.add("visible");
                        hintBtn.style.display = "none";
                    });
                }
            }

            // ═══════════════════════════════════════════════════
            //  BACKGROUND ANIMATION SYSTEM
            // ═══════════════════════════════════════════════════
            let bgAnimFrame = null;

            function startBackground(era) {
                if (bgAnimFrame) cancelAnimationFrame(bgAnimFrame);
                const canvas = document.getElementById("bg-canvas");
                if (!canvas) return;
                const ctx = canvas.getContext("2d");
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                const resizeHandler = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.removeEventListener("resize", window._bgResize);
                window._bgResize = resizeHandler;
                window.addEventListener("resize", resizeHandler, {
                    passive: true,
                });

                if (era === "1953") {
                    const motes = Array.from({ length: 60 }, () => ({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        r: Math.random() * 1.5 + 0.3,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: -Math.random() * 0.4 - 0.1,
                        alpha: Math.random() * 0.5 + 0.1,
                        flicker: Math.random() * Math.PI * 2,
                    }));
                    function draw1953() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        const t = Date.now() / 1000;
                        motes.forEach((m) => {
                            m.flicker += 0.03;
                            const a =

                                m.x = Math.random() * canvas.width;

                            if (m.x < 0) m.x = canvas.width;
                            if (m.x > canvas.width) m.x = 0;
                        });
                        bgAnimFrame = requestAnimationFrame(draw1953);

                                l.w = Math.random() * 0.6 + 0.1;

                            for (let j = i + 1; j < nodes.length; j++) {
                                const dx = nodes[i].x - nodes[j].x;
                                const dy = nodes[i].y - nodes[j].y;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                if (dist < 180) {
                                    ctx.beginPath();
                                    ctx.moveTo(nodes[i].x, nodes[i].y);
                                    ctx.lineTo(nodes[j].x, nodes[j].y);
                                    ctx.strokeStyle = `rgba(100,110,130,${(0.06 * (1 - dist / 180)).toFixed(3)})`;
                                    ctx.lineWidth = 0.5;
                                    ctx.stroke();
                                }
                            }
                            ctx.beginPath();
                            ctx.arc(
                                nodes[i].x,
                                nodes[i].y,
                                1.2,
                                0,
                                Math.PI * 2,
                            );
                            ctx.fillStyle = "rgba(100,110,130,0.25)";
                            ctx.fill();
                            nodes[i].x += nodes[i].vx;
                            nodes[i].y += nodes[i].vy;
                            if (nodes[i].x < 0 || nodes[i].x > canvas.width)
                                nodes[i].vx *= -1;

                            ctx.fillText(d.char, i * 22 + 4, d.y);

                                p.hue === 38
                                    ? "rgba(200,160,96,0.15)"
                                    : "rgba(74,127,181,0.15)";

                            for (let j = i + 1; j < pts.length; j++) {
                                const dx = pts[i].x - pts[j].x,
                                    dy = pts[i].y - pts[j].y,
                                    d = Math.sqrt(dx * dx + dy * dy);

                            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

            // ═══════════════════════════════════════════════════
            //  COMBINATION LOCK
            // ═══════════════════════════════════════════════════
            function createComboLock(
                containerId,
                correctAnswer,
                onCorrect,
                onWrong,
            ) {
                const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                const n = correctAnswer.length;
                const state = new Array(n).fill(0);
                let attempts = 0;
                let solved = false;

                function mod(v, m) {
                    return ((v % m) + m) % m;
                }

                function renderLock() {
                    const container = document.getElementById(containerId);
                    if (!container) return;
                    container.innerHTML = state
                        .map((val, i) => {
                            const letters = [-2, -1, 0, 1, 2].map(
                                (off) => LETTERS[mod(val + off, 26)],
                            );
                            return `
        <div class="wheel-col" data-idx="${i}" tabindex="0">
          <button class="wheel-btn wheel-up" data-idx="${i}" data-dir="-1">&#9650;</button>
          <div class="wheel-drum" data-idx="${i}">
            <div class="wheel-highlight"></div>
            <div class="wheel-drum-inner">
              ${letters.map((l, j) => `<div class="wheel-letter${j === 2 ? " active" : ""}">${l}</div>`).join("")}
            </div>
          </div>
          <button class="wheel-btn wheel-down" data-idx="${i}" data-dir="1">&#9650;</button>
        </div>`;
                        })
                        .join("");

                    container
                        .querySelectorAll(".wheel-down")
                        .forEach((b) => (b.style.transform = "rotate(180deg)"));

                    container.querySelectorAll(".wheel-btn").forEach((btn) => {
                        btn.addEventListener("mousedown", (e) => {
                            e.preventDefault();
                            if (solved) return;
                            const idx = +btn.dataset.idx;
                            const dir = +btn.dataset.dir;
                            state[idx] = mod(state[idx] + dir, 26);
                            updateDrum(idx);
                        });
                    });

                    container.querySelectorAll(".wheel-col").forEach((col) => {
                        const idx = +col.dataset.idx;
                        col.addEventListener("keydown", (e) => {
                            if (solved) return;
                            if (e.key === "ArrowUp") {
                                e.preventDefault();
                                state[idx] = mod(state[idx] - 1, 26);
                                updateDrum(idx);
                            }
                            if (e.key === "ArrowDown") {
                                e.preventDefault();
                                state[idx] = mod(state[idx] + 1, 26);
                                updateDrum(idx);
                            }
                        });
                        col.addEventListener(
                            "wheel",
                            (e) => {
                                e.preventDefault();
                                if (solved) return;
                                state[idx] = mod(
                                    state[idx] + (e.deltaY > 0 ? 1 : -1),
                                    26,
                                );
                                updateDrum(idx);
                            },
                            { passive: false },
                        );
                    });

                    container
                        .querySelectorAll(".wheel-drum")
                        .forEach((drum) => {
                            const idx = +drum.dataset.idx;
                            let startY = null;
                            let accumulated = 0;
                            drum.addEventListener("mousedown", (e) => {
                                startY = e.clientY;
                                accumulated = 0;
                            });
                            window.addEventListener("mousemove", (e) => {
                                if (startY === null || solved) return;
                                const dy = e.clientY - startY;
                                accumulated += dy;
                                startY = e.clientY;
                                if (Math.abs(accumulated) >= 20) {
                                    const steps = Math.round(accumulated / 20);
                                    state[idx] = mod(state[idx] + steps, 26);
                                    accumulated = 0;
                                    updateDrum(idx);
                                }
                            });
                            window.addEventListener("mouseup", () => {
                                startY = null;
                            });
                            drum.addEventListener(
                                "touchstart",
                                (e) => {
                                    startY = e.touches[0].clientY;
                                    accumulated = 0;
                                },
                                { passive: true },
                            );
                            drum.addEventListener(
                                "touchmove",
                                (e) => {
                                    if (startY === null || solved) return;
                                    const dy = e.touches[0].clientY - startY;
                                    accumulated += dy;
                                    startY = e.touches[0].clientY;
                                    if (Math.abs(accumulated) >= 18) {
                                        state[idx] = mod(
                                            state[idx] +
                                                (accumulated > 0 ? 1 : -1),
                                            26,
                                        );
                                        accumulated = 0;
                                        updateDrum(idx);
                                    }
                                },
                                { passive: true },
                            );
                        });
                }

                function updateDrum(idx) {
                    const container = document.getElementById(containerId);
                    if (!container) return;
                    const col = container.querySelector(
                        `.wheel-col[data-idx="${idx}"]`,
                    );
                    if (!col) return;
                    const val = state[idx];
                    const letters = [-2, -1, 0, 1, 2].map(
                        (off) => LETTERS[mod(val + off, 26)],
                    );
                    const inner = col.querySelector(".wheel-drum-inner");
                    if (inner)
                        inner.innerHTML = letters
                            .map(
                                (l, j) =>
                                    `<div class="wheel-letter${j === 2 ? " active" : ""}">${l}</div>`,
                            )
                            .join("");
                }

                function getValue() {
                    return state.map((v) => LETTERS[v]).join("");
                }

                function checkLock() {
                    if (solved) return;
                    const val = getValue();
                    if (val === correctAnswer) {
                        solved = true;
                        const container = document.getElementById(containerId);
                        if (container) container.classList.add("solved");
                        onCorrect();
                    } else {
                        attempts++;
                        const container = document.getElementById(containerId);
                        if (container) {
                            container.classList.add("error-shake");
                            setTimeout(
                                () => container.classList.remove("error-shake"),
                                400,
                            );
                        }
                        onWrong(attempts);
                    }
                }

                renderLock();
                return { checkLock, getValue };
            }

                let progress = 0;
                const barInterval = setInterval(() => {
                    progress += 100 / (2400 / 40);
                    barInner.style.width = Math.min(progress, 100) + "%";
                    if (progress >= 100) clearInterval(barInterval);
                }, 40);

                setTimeout(() => {
                    heartSvg.style.animation =
                        "heart-glow-pulse 0.5s ease-in-out 3";
                }, 1900);

                setTimeout(() => {
                    heartSvg.style.transition =
                        "opacity .5s ease, transform .5s ease";
                    heartSvg.style.opacity = "0";
                    heartSvg.style.transform = "scale(0.8)";
                    setTimeout(() => {
                        heartSvg.style.display = "none";
                        mohrchen.classList.add("show");
                    }, 300);
                }, 2500);

                setTimeout(() => {
                    if (window.gsap) {
                        gsap.to(loader, {
                            y: "-100%",
                            opacity: 0,
                            duration: 0.8,
                            ease: "power2.in",
                            onComplete: () => loader.remove(),
                        });
                    } else {
                        loader.classList.add("slide-out");
                        setTimeout(() => loader.remove(), 800);
                    }
                }, 3800);
            });

            // ═══════════════════════════════════════
            //  CLICK RIPPLE
            // ═══════════════════════════════════════
            document.addEventListener("click", (e) => {
                const el = document.createElement("div");
                el.style.cssText = `position:fixed;inset:0;background:rgba(74,127,181,0.04);pointer-events:none;z-index:99998;animation:redFlash .25s ease forwards;`;
                document.body.appendChild(el);
                setTimeout(() => {
                    if (el.parentNode) el.remove();
                }, 250);
            });
        </script>
    </body>
</html>
